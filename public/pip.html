<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chandu-Flix Player</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0; left: 0;
    }
    .loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #888; gap: 14px;
      z-index: 5;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(229, 9, 20, 0.2);
      border-top-color: #e50914;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading p { font-size: 0.85rem; color: #666; }
    .error {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #888; gap: 10px;
      text-align: center; padding: 20px;
    }
    .error h3 { color: #e50914; font-size: 1rem; }
    .error p { font-size: 0.8rem; color: #666; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loader">
    <div class="spinner"></div>
    <p>Loading player…</p>
  </div>
  <div class="error" id="error">
    <h3>No player URL provided</h3>
    <p>This page should be opened from Chandu-Flix.</p>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var src = params.get('src');
      var title = params.get('title');

      if (title) {
        document.title = title + ' — Chandu-Flix PiP';
      }

      if (!src) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
        return;
      }

      var iframe = document.createElement('iframe');
      iframe.src = src;
      iframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = 'origin';
      iframe.onload = function() {
        document.getElementById('loader').style.display = 'none';
      };
      document.body.appendChild(iframe);
    })();
  </script>
</body>
</html>
